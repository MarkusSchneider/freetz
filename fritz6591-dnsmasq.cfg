## dnsmasq 2.92 Konfiguration für Freetz-NG (Fritz!Box 6591)
## Ablage auf der Box: Freetz-Weboberfläche → dnsmasq → Konfiguration einfügen
##
## Freetz-Datenfluss (modhosts-Script):
##   /tmp/flash/mod/hosts  →  /var/tmp/hosts  (symlink /etc/hosts → DNS-Auflösung)
##                         →  /var/tmp/ethers (symlink /etc/ethers → statische DHCP-Leases)
##   Einträge mit MAC='*'  →  nur /etc/hosts (DNS-only), NICHT /etc/ethers (kein DHCP-Lease)

# ---------------------------------------------------------------------------
# Startverhalten
# ---------------------------------------------------------------------------

# dnsmasq aktivieren
export DNSMASQ_ENABLED='yes'

# rc.dnsmasq wird von multid/rextd aufgerufen (WRAPPER=yes = via multid-Hook)
# → dnsmasq startet VOR multid, damit Port 53 frei ist
export DNSMASQ_WRAPPER='yes'

# multid stoppen bevor dnsmasq startet, danach wieder starten
# → verhindert Konflikt auf Port 53 mit dem AVM-DNS-Daemon
export DNSMASQ_MULTID_RESTART='yes'

# ---------------------------------------------------------------------------
# DNS Server
# ---------------------------------------------------------------------------

# DNS auf Standard-Port 53
export DNSMASQ_DNS_PORT='53'

# Lokale Domain: Kurzname → kurzname.fritz.box (expand-hosts)
# FQDNs mit Punkten (z.B. vw.roemerbad.duckdns.org) werden NICHT erweitert
export DNSMASQ_DOMAIN='fritz.box'

# Fritz!Box-Upstream-DNS nutzen (Provider-DNS via ar7cfgctl)
# → dnsmasq leitet unbekannte Anfragen an den Provider-DNS der Box weiter
export DNSMASQ_AVM_DNS='yes'

# Keine zusätzlichen Upstream-Server
export DNSMASQ_UPSTREAM=''

# Kein Reverse-Lookup (PTR) für RFC1918-Adressen nach außen weiterleiten
export DNSMASQ_BOGUSPRIV='yes'

# Upstream-Antworten mit privaten IPs blockieren (DNS-Rebind-Schutz)
# ACHTUNG: betrifft nur Upstream-Antworten, NICHT lokale /etc/hosts-Einträge!
# → vw.roemerbad.duckdns.org → 192.168.0.52 funktioniert weiterhin (lokal)
export DNSMASQ_STOP_DNS_REBIND='yes'

# DHCP-Clients die sich als 'wpad' melden ignorieren (Sicherheit, CVE VU#598349)
export DNSMASQ_WPADFIX='yes'

# DNSSEC-Validierung deaktiviert
export DNSMASQ_DNSSEC='no'

# ---------------------------------------------------------------------------
# DHCP Server
# ---------------------------------------------------------------------------

# DHCP aktivieren
export DNSMASQ_DHCP='yes'

# Dynamischer Pool für Mobile/Tablets (200-254), Lease-Zeit 10 Tage
# .255 ist Broadcast und darf nicht vergeben werden
export DNSMASQ_DHCP_RANGE='192.168.0.200,192.168.0.254,10d'

# read-ethers: liest /etc/ethers → erzeugt statische DHCP-Leases
# modhosts befüllt /var/tmp/ethers aus hosts-Datei (nur Zeilen mit gültiger MAC)
# → alle Geräte mit echter MAC bekommen immer dieselbe IP
export DNSMASQ_ETHERS='yes'

# Keine separate dhcp-hostsfile (DNSMASQ_ETHERS reicht)
export DNSMASQ_DHCPHOSTFILE='no'

# PXE/Netzwerk-Boot deaktiviert
export DNSMASQ_DHCP_BOOT='no'
export DNSMASQ_DHCP_BOOTFILE=''

# ---------------------------------------------------------------------------
# TFTP Server
# ---------------------------------------------------------------------------

# TFTP deaktiviert (kein PXE-Boot benötigt)
export DNSMASQ_TFTP='no'
export DNSMASQ_TFTP_TFTPROOT=''

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

# DNS-Anfragen nicht mitloggen (Performanz auf der Box)
export DNSMASQ_LOG_QUERIES='no'

# Max. 25 Log-Zeilen asynchron puffern
export DNSMASQ_LOG_ASYNC='25'

# Keine zusätzlichen dnsmasq-Kommandozeilenoptionen
export DNSMASQ_OPTIONS=''
